<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#f0e6d0" />
  <title>Daily Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Caveat', cursive; background: #f0e6d0; min-height: 100vh; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #d4c4a8; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const QUOTES = [
  "Not every day is productive, but I didn't quit.",
  "Small steps every day lead to big changes.",
  "Discipline is choosing what you want most over what you want now.",
  "Progress, not perfection.",
  "You are one decision away from a completely different life.",
  "Every day is a new beginning.",
  "Be consistent, not perfect.",
  "The only bad workout is the one that didn't happen.",
];

const ICONS = ["⏰","🧘","💪","✨","👣","💧","🥗","📚","📖","📝","🏃","🎯","🌅","🍎","😴","🧹","💻","🎵","🏋️","🙏","🧴","☕","🌿","🚿","🍽️","🧠","❤️","🌙","🎨","🏊"];
const DAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

const dateKey = (d = new Date()) => {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,"0"), dd = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${dd}`;
};
const load = (k, fb) => { try { return JSON.parse(localStorage.getItem(k)) ?? fb; } catch { return fb; } };
const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));

const DEFAULT_CHALLENGE = {
  id: "c1", name: "21 Day Reset", totalDays: 21, startDate: dateKey(),
  routines: [
    { id: "r1", text: "Wake up @ 6am", icon: "⏰" },
    { id: "r2", text: "Meditation", icon: "🧘" },
    { id: "r3", text: "Exercise", icon: "💪" },
    { id: "r4", text: "Skin Care Routine", icon: "✨" },
    { id: "r5", text: "Complete 10K Steps", icon: "👣" },
    { id: "r6", text: "3L Water", icon: "💧" },
    { id: "r7", text: "No Junk & Sugar", icon: "🥗" },
    { id: "r8", text: "1 hr Study", icon: "📚" },
    { id: "r9", text: "Read Book", icon: "📖" },
    { id: "r10", text: "Plan Next Day", icon: "📝" },
  ],
  reminders: {},
};

function App() {
  const [dark, setDark] = useState(() => load("drk", false));
  const [challenges, setChallenges] = useState(() => load("chal", [DEFAULT_CHALLENGE]));
  const [activeId, setActiveId] = useState(() => load("aid", "c1"));
  const [completions, setCompletions] = useState(() => load("comp", {}));
  const [view, setView] = useState("today");
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({});
  const [editTarget, setEditTarget] = useState(null);
  const [noteOpen, setNoteOpen] = useState(null);
  const [notifPerm, setNotifPerm] = useState(() => (typeof Notification !== "undefined" ? Notification.permission : "default"));
  const quoteRef = useRef(QUOTES[Math.floor(Math.random() * QUOTES.length)]);
  const noteInputRef = useRef(null);

  useEffect(() => save("drk", dark), [dark]);
  useEffect(() => save("chal", challenges), [challenges]);
  useEffect(() => save("aid", activeId), [activeId]);
  useEffect(() => save("comp", completions), [completions]);

  useEffect(() => {
    const tick = () => {
      if (typeof Notification === "undefined" || Notification.permission !== "granted") return;
      const now = new Date();
      const hhmm = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
      const dk = dateKey();
      challenges.forEach(ch => {
        Object.entries(ch.reminders || {}).forEach(([rid, time]) => {
          if (time !== hhmm) return;
          const r = ch.routines.find(x => x.id === rid);
          if (r && !completions[dk]?.[ch.id]?.[rid]?.done) {
            try { new Notification(`${ch.name} — Reminder`, { body: `${r.icon} ${r.text}`, tag: `${ch.id}-${rid}` }); } catch(_) {}
          }
        });
      });
    };
    const id = setInterval(tick, 60000);
    return () => clearInterval(id);
  }, [challenges, completions]);

  useEffect(() => {
    if (noteOpen && noteInputRef.current) noteInputRef.current.focus();
  }, [noteOpen]);

  const ch = challenges.find(c => c.id === activeId) || challenges[0];
  const tk = dateKey();
  const now = new Date();
  const dayNum = ch ? Math.max(1, Math.min(Math.floor((now - new Date(ch.startDate)) / 86400000) + 1, ch.totalDays)) : 1;
  const comp = completions[tk]?.[ch?.id] || {};
  const doneCount = ch?.routines.filter(r => comp[r.id]?.done).length || 0;
  const totalCount = ch?.routines.length || 0;
  const scorePct = totalCount ? Math.round((doneCount / totalCount) * 100) : 0;

  const getStreak = (chal) => {
    let s = 0; const d = new Date();
    while (s < 366) {
      const k = dateKey(d);
      const c2 = completions[k]?.[chal.id] || {};
      const dn = chal.routines.filter(r => c2[r.id]?.done).length;
      if (chal.routines.length > 0 && dn === chal.routines.length) { s++; d.setDate(d.getDate() - 1); } else break;
    }
    return s;
  };

  const getHistory = (chal) => {
    const days = [];
    for (let i = 29; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const k = dateKey(d);
      const c2 = completions[k]?.[chal.id] || {};
      const dn = chal.routines.filter(r => c2[r.id]?.done).length;
      const tot = chal.routines.length;
      days.push({ date: d, key: k, done: dn, total: tot, pct: tot ? dn / tot : 0 });
    }
    return days;
  };

  const toggle = (rid) => {
    setCompletions(p => ({
      ...p,
      [tk]: { ...p[tk], [activeId]: { ...(p[tk]?.[activeId] || {}), [rid]: { ...(p[tk]?.[activeId]?.[rid] || {}), done: !p[tk]?.[activeId]?.[rid]?.done } } }
    }));
  };

  const setNote = (rid, note) => {
    setCompletions(p => ({
      ...p,
      [tk]: { ...p[tk], [activeId]: { ...(p[tk]?.[activeId] || {}), [rid]: { ...(p[tk]?.[activeId]?.[rid] || {}), note } } }
    }));
  };

  const saveRoutine = () => {
    if (!form.text?.trim()) return;
    if (editTarget) {
      setChallenges(p => p.map(c => c.id === activeId ? { ...c, routines: c.routines.map(r => r.id === editTarget.id ? { ...r, text: form.text.trim(), icon: form.icon || r.icon } : r) } : c));
    } else {
      const nr = { id: `r${Date.now()}`, text: form.text.trim(), icon: form.icon || "✅" };
      setChallenges(p => p.map(c => c.id === activeId ? { ...c, routines: [...c.routines, nr] } : c));
    }
    closeModal();
  };

  const deleteRoutine = (rid) => setChallenges(p => p.map(c => c.id === activeId ? { ...c, routines: c.routines.filter(r => r.id !== rid) } : c));

  const saveChallenge = () => {
    if (!form.name?.trim()) return;
    if (editTarget) {
      setChallenges(p => p.map(c => c.id === editTarget.id ? { ...c, name: form.name.trim(), totalDays: parseInt(form.totalDays) || 21, startDate: form.startDate || c.startDate } : c));
    } else {
      const nc = { id: `c${Date.now()}`, name: form.name.trim(), totalDays: parseInt(form.totalDays) || 21, startDate: form.startDate || tk, routines: [], reminders: {} };
      setChallenges(p => [...p, nc]);
      setActiveId(nc.id);
    }
    closeModal();
  };

  const deleteChallenge = (cid) => {
    if (challenges.length <= 1) return;
    const rem = challenges.filter(c => c.id !== cid);
    setChallenges(rem);
    if (activeId === cid) setActiveId(rem[0].id);
  };

  const setReminder = (rid, time) => {
    setChallenges(p => p.map(c => c.id === activeId ? {
      ...c, reminders: time
        ? { ...c.reminders, [rid]: time }
        : Object.fromEntries(Object.entries(c.reminders || {}).filter(([k]) => k !== rid))
    } : c));
  };

  const requestNotif = async () => {
    if (typeof Notification === "undefined") return;
    const p = await Notification.requestPermission();
    setNotifPerm(p);
  };

  const closeModal = () => { setModal(null); setForm({}); setEditTarget(null); };
  const openEditRoutine = (r) => { setEditTarget(r); setForm({ text: r.text, icon: r.icon }); setModal("routine"); };
  const openEditChallenge = (c) => { setEditTarget(c); setForm({ name: c.name, totalDays: String(c.totalDays), startDate: c.startDate }); setModal("challenge"); };

  const T = dark ? {
    bg: "#0d1117", paper: "#161b27", text: "#e2d5c0", sub: "#7d6e58",
    line: "#1e2535", accent: "#ff6b6b", green: "#52d68a", blue: "#7eb8f7",
    card: "#1a2035", border: "#2a3050", btnBg: "#1e2840", mutedBg: "#111827",
    shadow: "0 4px 20px rgba(0,0,0,0.35)",
  } : {
    bg: "#f0e6d0", paper: "#fffdf5", text: "#1a1208", sub: "#8a7050",
    line: "#e0cfa8", accent: "#d93025", green: "#2d6a4f", blue: "#1a56b0",
    card: "#fff8ee", border: "#d4c4a8", btnBg: "#ede0c4", mutedBg: "#f5ecd8",
    shadow: "0 4px 20px rgba(0,0,0,0.08)",
  };

  const fullDate = `${String(now.getDate()).padStart(2,"0")} / ${String(now.getMonth()+1).padStart(2,"0")} / ${now.getFullYear()}`;

  const s = {
    app: { fontFamily:"'Caveat',cursive", minHeight:"100vh", background:T.bg, color:T.text },
    hdr: { background:T.paper, borderBottom:`2px solid ${T.line}`, padding:"12px 14px 0", position:"sticky", top:0, zIndex:100, boxShadow:T.shadow },
    paper: { background:T.paper, border:`1px solid ${T.border}`, borderRadius:14, padding:16, margin:10, boxShadow:T.shadow, position:"relative" },
    redLine: { position:"absolute", top:0, left:54, bottom:0, width:1, background:"rgba(220,80,80,0.2)", pointerEvents:"none" },
    line: { borderBottom:`1px solid ${T.line}`, padding:"10px 0 10px 62px", position:"relative", display:"flex", alignItems:"center", gap:8, minHeight:52 },
    lnum: { position:"absolute", left:10, color:T.sub, fontSize:14, width:38, textAlign:"right", userSelect:"none" },
    inp: { fontFamily:"'Caveat',cursive", width:"100%", background:T.mutedBg, border:`1.5px solid ${T.border}`, borderRadius:9, padding:"10px 13px", fontSize:18, color:T.text, outline:"none" },
    prog: { height:6, background:T.line, borderRadius:3, overflow:"hidden", marginTop:10 },
  };

  const btn = (type, extra={}) => ({
    fontFamily:"'Caveat',cursive", cursor:"pointer", border:"none", borderRadius:8,
    padding:"9px 16px", fontSize:17, transition:"all .2s",
    ...(type==="p" ? { background:T.text, color:T.bg } : {}),
    ...(type==="s" ? { background:T.btnBg, color:T.text, border:`1px solid ${T.border}` } : {}),
    ...(type==="d" ? { background:`${T.accent}18`, color:T.accent, border:`1px solid ${T.accent}35` } : {}),
    ...extra
  });

  const pill = (active, activeColor) => ({
    fontFamily:"'Caveat',cursive", fontSize:12, padding:"3px 8px", borderRadius:20,
    cursor:"pointer", whiteSpace:"nowrap", border:`1px solid ${active ? activeColor+"35" : T.border}`,
    background: active ? activeColor+"20" : T.btnBg, color: active ? activeColor : T.sub,
  });

  return (
    <div style={s.app}>
      <style>{`
        @keyframes su{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
        .su{animation:su .22s ease;}
        ::-webkit-scrollbar{width:3px;}
        ::-webkit-scrollbar-thumb{background:${T.border};border-radius:2px;}
        input[type=time],input[type=date]{color-scheme:${dark?"dark":"light"};}
      `}</style>

      {/* HEADER */}
      <div style={s.hdr}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
          <div>
            <div style={{ fontSize:24, fontWeight:700, lineHeight:1 }}>📓 Daily Journal</div>
            <div style={{ fontSize:14, color:T.sub, marginTop:2 }}>{DAY_NAMES[now.getDay()]} · {fullDate}</div>
          </div>
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            {challenges.length > 1 && (
              <select value={activeId} onChange={e => setActiveId(e.target.value)}
                style={{ fontFamily:"'Caveat',cursive", background:T.mutedBg, border:`1.5px solid ${T.border}`, color:T.text, borderRadius:8, padding:"7px 10px", fontSize:15, outline:"none", maxWidth:130 }}>
                {challenges.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            )}
            <button onClick={() => setDark(d => !d)}
              style={{ ...btn("s"), padding:"7px 11px", fontSize:19 }}>
              {dark ? "☀️" : "🌙"}
            </button>
          </div>
        </div>
        <div style={{ display:"flex", gap:2 }}>
          {[["today","📋 Today"],["history","📅 History"],["challenges","🏆 Challenges"]].map(([v,l]) => (
            <button key={v} onClick={() => setView(v)}
              style={{ fontFamily:"'Caveat',cursive", cursor:"pointer", border:"none", fontSize:16,
                padding:"8px 12px", borderRadius:"8px 8px 0 0",
                background: view===v ? T.bg : "transparent",
                color: view===v ? T.text : T.sub, fontWeight: view===v ? 700 : 400 }}>
              {l}
            </button>
          ))}
        </div>
      </div>

      {/* TODAY */}
      {view==="today" && ch && (
        <div className="su">
          <div style={s.paper}>
            <div style={s.redLine} />
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
              <div>
                <div style={{ fontSize:13, color:T.sub }}>Day {dayNum} of {ch.totalDays}</div>
                <div style={{ fontSize:26, fontWeight:700, marginTop:2 }}>{ch.name}</div>
                <div style={{ fontSize:14, color:T.accent, marginTop:2 }}>🔥 {getStreak(ch)} day streak</div>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ fontSize:36, fontWeight:700, lineHeight:1, color: scorePct===100?T.green:scorePct>50?T.blue:T.text }}>
                  {doneCount}/{totalCount}
                </div>
                <div style={{ fontSize:13, color:T.sub }}>{scorePct}% done</div>
              </div>
            </div>
            <div style={s.prog}><div style={{ height:"100%", width:`${scorePct}%`, background:`linear-gradient(90deg,${T.green},${T.blue})`, borderRadius:3, transition:"width .4s" }} /></div>
            <div style={{ marginTop:6, display:"flex", justifyContent:"space-between", fontSize:13, color:T.sub }}>
              <span>Challenge: {Math.round(dayNum/ch.totalDays*100)}% done</span>
              <span>Score: {doneCount}/{totalCount}</span>
            </div>
          </div>

          <div style={s.paper}>
            <div style={s.redLine} />
            {ch.routines.length === 0 && (
              <div style={{ textAlign:"center", color:T.sub, padding:"20px 0", fontSize:17 }}>No routines yet. Add one below! 👇</div>
            )}
            {ch.routines.map((r, i) => {
              const done = !!comp[r.id]?.done;
              const note = comp[r.id]?.note || "";
              const reminder = ch.reminders?.[r.id];
              const isNoteOpen = noteOpen === r.id;
              return (
                <div key={r.id} style={{ ...s.line, position:"relative", flexWrap:"wrap" }}>
                  <span style={s.lnum}>{i+1}</span>
                  <button onClick={() => toggle(r.id)}
                    style={{ width:30, height:30, borderRadius:"50%", border:`2px solid ${done?T.green:T.border}`,
                      background: done?`${T.green}22`:"transparent", cursor:"pointer",
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:17, color:T.green, flexShrink:0 }}>
                    {done ? "✓" : ""}
                  </button>
                  <span onClick={() => toggle(r.id)}
                    style={{ flex:1, fontSize:19, lineHeight:1.2, cursor:"pointer", userSelect:"none",
                      textDecoration: done?"line-through":"none", color: done?T.sub:T.text }}>
                    {r.icon} {r.text}
                  </span>
                  <button style={pill(!!note, T.blue)} onClick={() => setNoteOpen(isNoteOpen?null:r.id)}>
                    {note ? (note.length>8?note.slice(0,8)+"…":note) : "+note"}
                  </button>
                  <button style={pill(!!reminder, T.accent)}
                    onClick={() => { setEditTarget(r); setForm({ time:reminder||"" }); setModal("reminder"); }}>
                    {reminder ? `⏰${reminder}` : "⏰"}
                  </button>
                  <span onClick={() => openEditRoutine(r)} style={{ cursor:"pointer", fontSize:16, padding:"2px 3px" }}>✏️</span>
                  <span onClick={() => deleteRoutine(r.id)} style={{ cursor:"pointer", fontSize:16, padding:"2px 3px" }}>🗑</span>
                  {isNoteOpen && (
                    <div style={{ width:"100%", display:"flex", gap:7, marginTop:6, paddingLeft:0 }}>
                      <input ref={noteInputRef} style={{ ...s.inp, fontSize:15, padding:"7px 11px" }}
                        placeholder="Add note… (e.g. 7AM, 5km)"
                        value={note} onChange={e => setNote(r.id, e.target.value)}
                        onKeyDown={e => { if(e.key==="Enter") setNoteOpen(null); }} />
                      <button style={btn("p",{padding:"7px 13px",fontSize:15})} onClick={() => setNoteOpen(null)}>Done</button>
                    </div>
                  )}
                </div>
              );
            })}
            <div style={{ paddingTop:12, paddingLeft:62, paddingBottom:4 }}>
              <button style={btn("s")} onClick={() => { setEditTarget(null); setForm({icon:"✅"}); setModal("routine"); }}>
                + Add Routine
              </button>
            </div>
          </div>

          <div style={{ ...s.paper, borderLeft:`4px solid ${T.accent}`, padding:"14px 16px 14px 20px" }}>
            <div style={{ fontSize:13, color:T.sub, marginBottom:5 }}>Remarks: ({doneCount}/{totalCount})</div>
            <div style={{ fontSize:20, fontStyle:"italic", color:T.sub, lineHeight:1.4 }}>"{quoteRef.current}"</div>
          </div>
        </div>
      )}

      {/* HISTORY */}
      {view==="history" && ch && (
        <div className="su">
          <div style={s.paper}>
            <div style={{ fontSize:22, fontWeight:700, marginBottom:14 }}>📅 {ch.name} — History</div>
            <div style={{ fontSize:14, color:T.sub, marginBottom:8 }}>Last 30 days</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
              {getHistory(ch).map((d,i) => {
                const isToday = d.key===tk;
                const bg = d.total===0?`${T.border}60`:d.pct===1?T.green:d.pct>=0.5?T.blue:d.pct>0?T.accent:`${T.border}60`;
                return (
                  <div key={i} title={`${d.date.toDateString()}: ${d.done}/${d.total}`}
                    style={{ width:34,height:34,background:bg,borderRadius:8,
                      border:isToday?`2px solid ${T.text}`:"2px solid transparent",
                      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"default" }}>
                    <div style={{ fontSize:10, color:"#fff", fontWeight:700 }}>{d.date.getDate()}</div>
                    {d.total>0&&<div style={{ fontSize:8, color:"rgba(255,255,255,.8)" }}>{d.done}/{d.total}</div>}
                  </div>
                );
              })}
            </div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:12, marginTop:12, fontSize:13, color:T.sub }}>
              {[["All done 💯",T.green],["≥50% ✓",T.blue],["Started 🔸",T.accent],["Empty",T.border]].map(([l,c])=>(
                <span key={l} style={{ display:"flex", alignItems:"center", gap:5 }}>
                  <span style={{ width:13,height:13,borderRadius:3,background:c,display:"inline-block" }}/>{l}
                </span>
              ))}
            </div>
          </div>
          <div style={s.paper}>
            <div style={{ fontSize:20, fontWeight:700, marginBottom:10 }}>Last 7 Days</div>
            {getHistory(ch).slice(-7).reverse().map((d,i)=>(
              <div key={i} style={{ ...s.line, paddingLeft:8 }}>
                <div style={{ flex:1, fontWeight:600, fontSize:17 }}>
                  {d.key===tk?"Today 📌":d.date.toLocaleDateString("en-IN",{weekday:"short",month:"short",day:"numeric"})}
                </div>
                <div style={{ fontSize:16, color:d.pct===1?T.green:d.pct>0.5?T.blue:T.sub, minWidth:50, textAlign:"right" }}>{d.done}/{d.total}</div>
                <div style={{ width:70,height:6,background:T.line,borderRadius:3,overflow:"hidden" }}>
                  <div style={{ height:"100%",width:`${d.pct*100}%`,background:d.pct===1?T.green:d.pct>=0.5?T.blue:T.accent,borderRadius:3 }}/>
                </div>
                <div style={{ fontSize:14,color:T.sub,minWidth:36,textAlign:"right" }}>{Math.round(d.pct*100)}%</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* CHALLENGES */}
      {view==="challenges" && (
        <div className="su">
          <div style={s.paper}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
              <div style={{ fontSize:22, fontWeight:700 }}>🏆 My Challenges</div>
              <button style={btn("p")} onClick={()=>{ setEditTarget(null); setForm({totalDays:"21",startDate:tk}); setModal("challenge"); }}>+ New</button>
            </div>
            {challenges.map(c=>{
              const dn2=Math.max(1,Math.min(Math.floor((now-new Date(c.startDate))/86400000)+1,c.totalDays));
              const cdone=completions[tk]?.[c.id]||{};
              const cdoneCount=c.routines.filter(r=>cdone[r.id]?.done).length;
              const str2=getStreak(c);
              const pct2=Math.round(dn2/c.totalDays*100);
              return (
                <div key={c.id} onClick={()=>{setActiveId(c.id);setView("today");}}
                  style={{ background:T.card,border:`2px solid ${c.id===activeId?T.text:T.border}`,borderRadius:13,
                    padding:14,marginBottom:10,cursor:"pointer",transition:"all .2s" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <div style={{ fontSize:20, fontWeight:700 }}>{c.name}</div>
                        {c.id===activeId&&<span style={{ fontSize:12,background:`${T.green}25`,color:T.green,padding:"2px 8px",borderRadius:10 }}>Active</span>}
                      </div>
                      <div style={{ fontSize:14,color:T.sub,marginTop:2 }}>Day {dn2} of {c.totalDays} · {c.routines.length} habits</div>
                    </div>
                    <div style={{ display:"flex", gap:6 }} onClick={e=>e.stopPropagation()}>
                      <button style={btn("s",{padding:"4px 10px",fontSize:15})} onClick={()=>openEditChallenge(c)}>✏️</button>
                      {challenges.length>1&&<button style={btn("d",{padding:"4px 10px",fontSize:15})} onClick={()=>deleteChallenge(c.id)}>🗑</button>}
                    </div>
                  </div>
                  <div style={{ display:"flex",flexWrap:"wrap",gap:14,marginTop:10,fontSize:14,color:T.sub }}>
                    <span>🔥{str2} streak</span><span>📋{cdoneCount}/{c.routines.length} today</span><span>📅{pct2}% done</span>
                  </div>
                  <div style={s.prog}><div style={{ height:"100%",width:`${pct2}%`,background:`linear-gradient(90deg,${T.green},${T.blue})`,borderRadius:3 }}/></div>
                </div>
              );
            })}
          </div>
          <div style={s.paper}>
            <div style={{ fontSize:20, fontWeight:700, marginBottom:10 }}>🔔 Notifications</div>
            {notifPerm==="granted"?(
              <div style={{ color:T.green,fontSize:17 }}>✅ Notifications enabled!<br/><span style={{ color:T.sub,fontSize:15 }}>Set reminders per habit from Today view (⏰ button).</span></div>
            ):notifPerm==="denied"?(
              <div style={{ color:T.accent,fontSize:16 }}>❌ Notifications blocked. Enable in browser/device settings.</div>
            ):(
              <div>
                <div style={{ fontSize:16,color:T.sub,marginBottom:12,lineHeight:1.4 }}>Enable notifications to get daily reminders for each routine.</div>
                <button style={btn("p")} onClick={requestNotif}>🔔 Enable Notifications</button>
              </div>
            )}
          </div>
        </div>
      )}

      {/* MODALS */}
      {modal&&(
        <div onClick={closeModal}
          style={{ position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center" }}>
          <div className="su" onClick={e=>e.stopPropagation()}
            style={{ background:T.paper,borderRadius:"20px 20px 0 0",padding:22,width:"100%",maxWidth:480,maxHeight:"82vh",overflowY:"auto" }}>

            {modal==="routine"&&(
              <>
                <div style={{ fontSize:22,fontWeight:700,marginBottom:18 }}>{editTarget?"✏️ Edit Routine":"➕ Add Routine"}</div>
                <div style={{ marginBottom:14 }}>
                  <label style={{ fontSize:15,color:T.sub,display:"block",marginBottom:6 }}>Routine Name</label>
                  <input className="inp-style" style={s.inp} placeholder="e.g. Morning Run 🏃" value={form.text||""} onChange={e=>setForm(p=>({...p,text:e.target.value}))} autoFocus />
                </div>
                <div style={{ marginBottom:18 }}>
                  <label style={{ fontSize:15,color:T.sub,display:"block",marginBottom:6 }}>Choose Icon</label>
                  <div style={{ display:"grid",gridTemplateColumns:"repeat(10,1fr)",gap:5 }}>
                    {ICONS.map(ic=>(
                      <button key={ic} onClick={()=>setForm(p=>({...p,icon:ic}))}
                        style={{ width:30,height:30,borderRadius:6,border:`1px solid ${form.icon===ic?T.text:T.border}`,
                          background:form.icon===ic?T.btnBg:T.mutedBg,cursor:"pointer",fontSize:16,
                          transform:form.icon===ic?"scale(1.18)":"scale(1)",transition:"all .15s" }}>
                        {ic}
                      </button>
                    ))}
                  </div>
                </div>
                <div style={{ display:"flex",gap:10 }}>
                  <button style={btn("p",{flex:1})} onClick={saveRoutine}>{editTarget?"Save Changes":"Add Routine"}</button>
                  <button style={btn("s")} onClick={closeModal}>Cancel</button>
                </div>
              </>
            )}

            {modal==="challenge"&&(
              <>
                <div style={{ fontSize:22,fontWeight:700,marginBottom:18 }}>{editTarget?"✏️ Edit Challenge":"🏆 New Challenge"}</div>
                <div style={{ marginBottom:14 }}>
                  <label style={{ fontSize:15,color:T.sub,display:"block",marginBottom:6 }}>Challenge Name</label>
                  <input style={s.inp} placeholder="e.g. 30 Day Fitness" value={form.name||""} onChange={e=>setForm(p=>({...p,name:e.target.value}))} autoFocus />
                </div>
                <div style={{ marginBottom:14 }}>
                  <label style={{ fontSize:15,color:T.sub,display:"block",marginBottom:6 }}>Duration (days)</label>
                  <input style={s.inp} type="number" min="1" max="365" placeholder="21" value={form.totalDays||""} onChange={e=>setForm(p=>({...p,totalDays:e.target.value}))} />
                </div>
                <div style={{ marginBottom:20 }}>
                  <label style={{ fontSize:15,color:T.sub,display:"block",marginBottom:6 }}>Start Date</label>
                  <input style={s.inp} type="date" value={form.startDate||tk} onChange={e=>setForm(p=>({...p,startDate:e.target.value}))} />
                </div>
                <div style={{ display:"flex",gap:10 }}>
                  <button style={btn("p",{flex:1})} onClick={saveChallenge}>{editTarget?"Save Changes":"Create Challenge"}</button>
                  <button style={btn("s")} onClick={closeModal}>Cancel</button>
                </div>
              </>
            )}

            {modal==="reminder"&&editTarget&&(
              <>
                <div style={{ fontSize:22,fontWeight:700,marginBottom:6 }}>⏰ Set Reminder</div>
                <div style={{ fontSize:18,color:T.sub,marginBottom:18 }}>{editTarget.icon} {editTarget.text}</div>
                {notifPerm!=="granted"?(
                  <div>
                    <div style={{ color:T.accent,marginBottom:14,fontSize:16 }}>
                      {notifPerm==="denied"?"❌ Notifications blocked. Enable in browser settings.":"Enable notifications first."}
                    </div>
                    {notifPerm!=="denied"&&<button style={btn("p")} onClick={requestNotif}>🔔 Enable Notifications</button>}
                  </div>
                ):(
                  <>
                    <div style={{ marginBottom:18 }}>
                      <label style={{ fontSize:15,color:T.sub,display:"block",marginBottom:6 }}>Reminder Time</label>
                      <input style={s.inp} type="time" value={form.time||""} onChange={e=>setForm(p=>({...p,time:e.target.value}))} />
                    </div>
                    <div style={{ display:"flex",gap:10 }}>
                      <button style={btn("p",{flex:1})} onClick={()=>{setReminder(editTarget.id,form.time);closeModal();}}>Set Reminder</button>
                      {ch?.reminders?.[editTarget.id]&&<button style={btn("d")} onClick={()=>{setReminder(editTarget.id,null);closeModal();}}>Remove</button>}
                      <button style={btn("s")} onClick={closeModal}>Cancel</button>
                    </div>
                  </>
                )}
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
